<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticket Summary</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="app-container">

        <header class="app-header">
            <a href="passenger-info.html" class="icon-btn" aria-label="Go back">
                <span class="material-symbols-outlined">arrow_back</span>
            </a>
            <h1>Ticket Summary</h1>
            <button class="icon-btn" type="button" aria-label="Menu">
                <span class="material-symbols-outlined">apps</span>
            </button>
        </header>

        <div class="summary-page">

            <div class="summary-card">

                <div class="summary-row">
                    <span>Bus</span>
                    <strong>Happy Nation</strong>
                </div>

                <div class="summary-row">
                    <span>Route</span>
                    <strong>DSM → MWZ</strong>
                </div>

                <div class="summary-row">
                    <span>Date</span>
                    <strong>16 Jun 2026</strong>
                </div>

                <div class="summary-row">
                    <span>Seat</span>
                    <strong>07, 08</strong>
                </div>

                <div class="summary-row">
                    <span>Passengers</span>
                    <strong>2</strong>
                </div>

                <div class="summary-row total">
                    <span>Total</span>
                    <strong>TSh 70,000</strong>
                </div>

            </div>

            <a href="ticket-view.html" class="btn-complete-booking">Pay Ticket</a>

        </div>

    </div>

</body>

</html>
