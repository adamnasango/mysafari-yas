<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Passenger Information</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="app-container">

        <header class="app-header app-header--compact">
            <a href="choose-seat.html" class="icon-btn" aria-label="Go back">
                <span class="material-symbols-outlined">arrow_back</span>
            </a>
            <h1>Passenger Info</h1>
        </header>

        <div class="passenger-page">

            <div class="passenger-card" data-seat="7">

                <div class="passenger-card-header">Seat 7</div>

                <div class="field-group">
                    <div class="field-box">
                        <label>First name</label>
                        <input type="text" placeholder="First name" value="Adam">
                    </div>
                </div>

                <div class="field-group">
                    <div class="field-box">
                        <label>Last name</label>
                        <input type="text" placeholder="Last name" value="Nasango">
                    </div>
                </div>

                <div class="field-group">
                    <div class="field-box">
                        <label>Phone number</label>
                        <input type="tel" placeholder="Phone number" value="0742 510 285">
                    </div>
                </div>

                <div class="passenger-type">
                    <button type="button" class="type-pill active" data-type="adult">Adult</button>
                    <button type="button" class="type-pill" data-type="child">Child</button>
                </div>

                <div class="toggle-section-card">
                    <div class="toggle-row">
                        <div class="toggle-label-wrap">
                            <span>Different Pickup Point</span>
                            <small>Default Shekilango</small>
                        </div>
                        <label class="toggle-switch">
                            <input type="checkbox" class="pickup-toggle" checked>
                            <span class="toggle-slider"></span>
                        </label>
                    </div>
                    <div class="radio-list pickup-options">
                        <label class="radio-option">
                            <input type="radio" name="pickup-7" value="Mbezi" checked>
                            Mbezi
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="pickup-7" value="Kibaha">
                            Kibaha
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="pickup-7" value="Chalinze">
                            Chalinze
                        </label>
                    </div>
                </div>

                <div class="toggle-section-card">
                    <div class="toggle-row">
                        <div class="toggle-label-wrap">
                            <span>Different Drop Point</span>
                            <small>Default Ndugai stand Dodoma</small>
                        </div>
                        <label class="toggle-switch">
                            <input type="checkbox" class="drop-toggle">
                            <span class="toggle-slider"></span>
                        </label>
                    </div>
                    <div class="radio-list drop-options d-none">
                        <label class="radio-option">
                            <input type="radio" name="drop-7" value="City Centre">
                            City Centre
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="drop-7" value="Airport">
                            Airport
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="drop-7" value="Bus Stand">
                            Bus Stand
                        </label>
                    </div>
                </div>

            </div>

            <div class="passenger-card" data-seat="8">

                <div class="passenger-card-header">Seat 8</div>

                <div class="field-group">
                    <div class="field-box">
                        <label>First name</label>
                        <input type="text" placeholder="First name">
                    </div>
                </div>

                <div class="field-group">
                    <div class="field-box">
                        <label>Last name</label>
                        <input type="text" placeholder="Last name">
                    </div>
                </div>

                <div class="field-group">
                    <div class="field-box">
                        <label>Phone number</label>
                        <input type="tel" placeholder="Phone number">
                    </div>
                </div>

                <div class="passenger-type">
                    <button type="button" class="type-pill active" data-type="adult">Adult</button>
                    <button type="button" class="type-pill" data-type="child">Child</button>
                </div>

                <div class="toggle-section-card">
                    <div class="toggle-row">
                        <div class="toggle-label-wrap">
                            <span>Different Pickup Point</span>
                            <small>Default Shekilango</small>
                        </div>
                        <label class="toggle-switch">
                            <input type="checkbox" class="pickup-toggle">
                            <span class="toggle-slider"></span>
                        </label>
                    </div>
                    <div class="radio-list pickup-options d-none">
                        <label class="radio-option">
                            <input type="radio" name="pickup-8" value="Mbezi">
                            Mbezi
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="pickup-8" value="Kibaha">
                            Kibaha
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="pickup-8" value="Chalinze">
                            Chalinze
                        </label>
                    </div>
                </div>

                <div class="toggle-section-card">
                    <div class="toggle-row">
                        <div class="toggle-label-wrap">
                            <span>Different Drop Point</span>
                            <small>Default Ndugai stand Dodoma</small>
                        </div>
                        <label class="toggle-switch">
                            <input type="checkbox" class="drop-toggle">
                            <span class="toggle-slider"></span>
                        </label>
                    </div>
                    <div class="radio-list drop-options d-none">
                        <label class="radio-option">
                            <input type="radio" name="drop-8" value="City Centre">
                            City Centre
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="drop-8" value="Airport">
                            Airport
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="drop-8" value="Bus Stand">
                            Bus Stand
                        </label>
                    </div>
                </div>

            </div>

            <a href="ticket-summary.html" class="btn-complete-booking">Complete Booking</a>

        </div>

    </div>

    <script src="js/passenger.js"></script>

</body>

</html>
