<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MySafari Yas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="app-container">

        <header class="app-header">
            <button class="icon-btn" type="button" aria-label="Go back">
                <span class="material-symbols-outlined">arrow_back</span>
            </button>
            <h1>My Safari</h1>
            <button class="icon-btn" type="button" aria-label="Menu">
                <span class="material-symbols-outlined">apps</span>
            </button>
        </header>

        <div class="page-content">

            <section class="search-section">

                <div class="route-card">

                    <div class="route-wrapper">

                        <div class="route-line">
                            <div class="top-dot"></div>
                            <div class="line-blue"></div>
                            <div class="bus-icon">
                                <span class="material-symbols-outlined">directions_bus</span>
                            </div>
                            <div class="line-yellow"></div>
                            <div class="bottom-dot"></div>
                        </div>

                        <div class="route-content">

                            <div class="route-top">
                                <label>From</label>
                                <h3 id="fromCode">DSM</h3>
                                <p id="fromCity">Dar es salaam</p>
                            </div>

                            <hr class="route-divider">

                            <div class="route-bottom" id="destinationField">
                                <label>To</label>
                                <input id="destinationInput" type="text" placeholder="Destination" autocomplete="off">
                                <button type="button" class="clear-btn" id="clearDestination" aria-label="Clear destination">
                                    <span class="material-symbols-outlined">close</span>
                                </button>
                            </div>

                            <div class="route-bottom d-none" id="destinationSelected">
                                <label>To</label>
                                <h3 id="toCode"></h3>
                                <p id="toCity"></p>
                            </div>

                        </div>

                        <button type="button" class="swap-btn" aria-label="Swap route">
                            <span class="material-symbols-outlined">swap_vert</span>
                        </button>

                    </div>

                    <div id="destinationResults" class="destination-results"></div>

                </div>

            </section>

            <section class="date-section">

                <div class="date-card" id="dateCard">
                    <span class="material-symbols-outlined">calendar_month</span>
                    <p id="dateText">Travel date</p>
                    <button type="button" class="close-date" id="closeDate" aria-label="Clear date">
                        <span class="material-symbols-outlined">close</span>
                    </button>
                </div>

                <div id="calendarCard" class="calendar-card d-none">
                    <div class="calendar-header">
                        <button type="button">Jun</button>
                        <button type="button">2026</button>
                    </div>
                    <div class="week-days">
                        <span>Mo</span>
                        <span>Tu</span>
                        <span>We</span>
                        <span>Th</span>
                        <span>Fr</span>
                        <span>Sa</span>
                        <span>Su</span>
                    </div>
                    <div class="calendar-grid" id="calendarGrid"></div>
                </div>

            </section>

            <section class="cover-section">
                <div class="cover-card">
                    <img src="assets/images/cover.jpg" alt="Tanzania bus booking platform">
                    <div class="cover-overlay">
                        <h2>
                            Tanzania's Leading<br>
                            Bus Ticket Booking<br>
                            Platform
                        </h2>
                        <span>mysafar.co.tz</span>
                    </div>
                </div>
            </section>

            <a href="choose-bus.html" class="btn-find-bus">Find Bus</a>

        </div>

    </div>

    <script src="js/search.js"></script>
    <script src="js/app.js"></script>

</body>

</html>
