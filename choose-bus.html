<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choose Bus</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="app-container">

        <header class="app-header">
            <a href="index.html" class="icon-btn" aria-label="Go back">
                <span class="material-symbols-outlined">arrow_back</span>
            </a>
            <h1>Choose Bus</h1>
            <button class="icon-btn" type="button" aria-label="Menu">
                <span class="material-symbols-outlined">apps</span>
            </button>
        </header>

        <div class="page-content">

            <div class="bus-list">

                <article class="bus-card">

                    <img src="assets/images/happy-nation.jpg" alt="Happy Nation Express buses">

                    <div class="bus-body">

                        <div class="bus-top">
                            <span>Happy Nation</span>
                            <span>T141EHS</span>
                        </div>

                        <hr>

                        <div class="bus-middle">

                            <div class="bus-endpoint">
                                <label>From</label>
                                <h3>DSM</h3>
                                <p>Dar es salaam</p>
                                <span class="departure-time">6:00 AM</span>
                            </div>

                            <div class="center-bus">
                                <p class="seats-remain">6 Seats remain</p>
                                <div class="bus-circle">
                                    <span class="material-symbols-outlined">directions_bus</span>
                                </div>
                                <span class="travel-date">14 June 26</span>
                            </div>

                            <div class="bus-endpoint bus-endpoint--right">
                                <label>To</label>
                                <h3>MWZ</h3>
                                <p>Mwanza</p>
                                <span class="arrival-time">2:00 PM</span>
                            </div>

                        </div>

                        <hr>

                        <div class="bus-features">
                            <span>VVIP</span>
                            <i class="fa-solid fa-wifi"></i>
                            <i class="fa-solid fa-tv"></i>
                            <i class="fa-solid fa-wine-glass"></i>
                        </div>

                        <a href="choose-seat.html" class="bus-price">TSh 35,000</a>

                    </div>

                </article>

            </div>

        </div>

    </div>

</body>

</html>
