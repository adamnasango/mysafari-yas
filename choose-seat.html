<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choose Seat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="app-container">

        <header class="app-header app-header--compact">
            <a href="choose-bus.html" class="icon-btn" aria-label="Go back">
                <span class="material-symbols-outlined">arrow_back</span>
            </a>
            <h1>Choose Seat</h1>
        </header>

        <div class="seat-page">

            <div class="seat-legend-bar">
                <div class="legend-item">
                    <span class="legend-seat available"></span>
                    Available
                </div>
                <div class="legend-item">
                    <span class="legend-seat taken"></span>
                    Taken
                </div>
                <div class="legend-item">
                    <span class="legend-seat selected"></span>
                    Selected
                </div>
            </div>

            <div class="bus-info-bar">
                <span>Happy Nation</span>
                <span>T141EHS</span>
            </div>

            <div class="seat-map-area">

                <div class="driver-area">
                    <img src="assets/svg/steering-wheel.svg" alt="Driver">
                </div>

                <div class="seat-grid" id="seatGrid"></div>

            </div>

            <footer class="seat-footer">

                <div class="seat-footer-info">
                    <p>Selected seat</p>
                    <div class="seat-footer-selection">
                        <span class="material-symbols-outlined seat-icon">airline_seat_recline_normal</span>
                        <h4 id="selectedSeats">—</h4>
                    </div>
                </div>

                <a id="bookNowBtn" href="#" class="btn-book-now disabled">Book Now</a>

            </footer>

        </div>

    </div>

    <script src="js/seats.js"></script>

</body>

</html>
